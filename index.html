<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roboniela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="title">
    <h1>Roboniela</h1>
    <p class="subtitle">Escribe algo y dale clic a <strong>¡Hablar!</strong></p>
  </header>

  <main class="stage">
    <div class="robot-wrap" id="robotWrap">
      <img src="robot.png" alt="Robot rosa con coleta" class="robot-img" />

      <!-- Brillo de los ojos -->
      <div class="eye eye-left"></div>
      <div class="eye eye-right"></div>

      <!-- Boca animada (barras tipo ecualizador) -->
      <div class="mouth" id="mouth">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- Lucecitas en las antenas -->
      <div class="antenna antenna-left"></div>
      <div class="antenna antenna-right"></div>
    </div>

    <div class="speech-bubble" id="bubble" aria-live="polite">
      ¡Hola! Soy <strong>Roboniela</strong>. Escríbeme algo abajo y lo digo en voz alta.
    </div>
  </main>

  <section class="controls">
    <textarea
      id="textInput"
      placeholder="Escribe aquí lo que quieres que diga el robot..."
      rows="3"
      maxlength="400"
    >¡Hola Sergio! Soy Roboniela, tu robot parlante.</textarea>

    <div class="row">
      <label class="voice-label">
        Voz:
        <select id="voiceSelect" aria-label="Selecciona voz"></select>
      </label>
      <label class="rate-label">
        Velocidad:
        <input type="range" id="rate" min="0.6" max="1.4" step="0.05" value="1" />
      </label>
    </div>

    <div class="row buttons">
      <button id="speakBtn" class="btn primary">¡Hablar!</button>
      <button id="stopBtn" class="btn secondary">Detener</button>
    </div>

    <p class="hint">
      Tip: la primera vez que toques el botón el navegador puede pedir activar el audio.
    </p>
  </section>

  <footer>
    <p>Hecho con 💖 para Sergio · <a href="https://github.com/soorozco" target="_blank" rel="noopener">@soorozco</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
