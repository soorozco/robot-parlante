<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roboniela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars" aria-hidden="true"></div>

  <header class="title">
    <h1>Roboniela</h1>
    <p class="subtitle">Tu asistente con humor médico 🩺</p>
  </header>

  <main class="stage">
    <div class="robot-wrap" id="robotWrap">
      <img src="robot.png" alt="Robot rosa con coleta" class="robot-img" />

      <!-- Brillo de los ojos -->
      <div class="eye eye-left"></div>
      <div class="eye eye-right"></div>

      <!-- Boca animada (barras tipo ecualizador) -->
      <div class="mouth" id="mouth">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- Lucecitas en las antenas -->
      <div class="antenna antenna-left"></div>
      <div class="antenna antenna-right"></div>
    </div>

    <div class="speech-bubble" id="bubble" aria-live="polite">
      ¡Hola! Soy <strong>Roboniela</strong>. Aprieta un botón y te cuento algo médico 🩺
    </div>
  </main>

  <section class="controls">
    <div class="row big-buttons">
      <button id="jokeBtn" class="btn primary big">
        <span class="emoji" aria-hidden="true">😂</span>
        <span>Cuéntame un chiste</span>
      </button>
      <button id="triviaBtn" class="btn primary big">
        <span class="emoji" aria-hidden="true">💡</span>
        <span>Dame una trivia</span>
      </button>
    </div>

    <div class="row">
      <button id="stopBtn" class="btn secondary">Detener</button>
    </div>

    <details class="settings">
      <summary>⚙️ Ajustes de voz</summary>
      <div class="row">
        <label class="voice-label">
          Voz:
          <select id="voiceSelect" aria-label="Selecciona voz"></select>
        </label>
      </div>
      <div class="row">
        <label class="rate-label">
          Velocidad:
          <input type="range" id="rate" min="0.6" max="1.4" step="0.05" value="0.88" />
        </label>
        <label class="pitch-label">
          Tono:
          <input type="range" id="pitch" min="0.3" max="1.2" step="0.05" value="0.55" />
        </label>
      </div>
      <label class="retro-label" title="Habla palabra por palabra con micro-pausas, estilo robot retro">
        <input type="checkbox" id="retro" checked />
        Modo robot retro
      </label>
    </details>
  </section>

  <script src="script.js"></script>
</body>
</html>
